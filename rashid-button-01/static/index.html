<!DOCTYPE html>
<html>
 <head>
  <style>
    #container iframe {
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.4s ease, transform 0.4s ease;
      width: 100%;
      height: 400px;
      border: none;
    }
    #container iframe.show {
      opacity: 1;
      border: 3pt solid red;
      border-radius: 6pt;
      transform: scale(1);
    }
  </style>
 </head>
<body>
  <button id="btn">Magic</button>
  <div id="container"></div>
  <script>
    iframe = null;
    document.getElementById('btn').onclick = async () => {
      if (!iframe) {
          const res = await fetch('/api/get-url', { method: 'POST' });
          const data = await res.json();
          iframe = document.createElement('iframe');
          iframe.src = data.url;
          iframe.style.width = '100%';
          iframe.style.height = '400px';
          document.getElementById('container').appendChild(iframe);
          iframe.offsetHeight; // force reflow so transition triggers
          iframe.classList.toggle('show');
          document.getElementById('btn').textContent = "Close";
      } else {
          iframe.classList.toggle('show');
          document.getElementById('container').removeChild(iframe);
          delete(iframe);
          iframe=null;
          document.getElementById('btn').textContent = "Open";
      }
    };
  </script>
</body>
</html>
